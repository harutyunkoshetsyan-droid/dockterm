name: Release

# Push a version tag (e.g. v0.1.0) to build installers for every OS and attach
# them to the matching GitHub Release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, args: '--win --x64', label: windows-x64 }
          # Both macOS arches build on Apple-Silicon runners (macos-14): the Intel
          # macos-13 runners are scarce/deprecated and were stalling releases. Two
          # parallel jobs each build + notarize their own arch's .dmg.
          - { os: macos-14, args: '--mac --arm64', label: mac-arm64 }
          - { os: macos-14, args: '--mac --x64', label: mac-x64 }
          - { os: ubuntu-latest, args: '--linux --x64', label: linux-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundles
        run: npm run build
        # The renderer bundle (Monaco) is heavy; raise the V8 heap so the build
        # never OOMs on a runner with a low default limit.
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Package and publish installer
        shell: bash
        # macOS: if the Apple signing secrets are configured (see SIGNING.md) the
        # .dmg is signed with the Developer ID cert and notarized by Apple, so it
        # opens with no Gatekeeper warning. If the secrets are absent (or on
        # Windows/Linux), it builds unsigned exactly as before. The Apple/cert
        # env is only injected on macOS runners so it can never be mistaken for a
        # Windows signing cert.
        run: |
          set -e
          ARGS="${{ matrix.args }}"
          if [ -n "$APPLE_API_KEY_ID" ]; then
            echo "Notarizing via App Store Connect API key (preferred)"
            mkdir -p "$HOME/private_keys"
            printf '%s' "$APPLE_API_KEY_P8" > "$HOME/private_keys/AuthKey.p8"
            export APPLE_API_KEY="$HOME/private_keys/AuthKey.p8"
            npx --no-install electron-builder $ARGS --publish always -c.mac.notarize=true
          elif [ -n "$APPLE_ID" ]; then
            echo "Notarizing via Apple ID + app-specific password"
            npx --no-install electron-builder $ARGS --publish always -c.mac.notarize=true
          else
            echo "No Apple credentials — building unsigned"
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx --no-install electron-builder $ARGS --publish always
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Mac-only: Developer ID cert (.p12 → base64) + its password.
          CSC_LINK: ${{ startsWith(matrix.os, 'macos') && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ startsWith(matrix.os, 'macos') && secrets.CSC_KEY_PASSWORD || '' }}
          # Mac-only, preferred: App Store Connect API key (more reliable in CI).
          APPLE_API_KEY_P8: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_API_KEY_P8 || '' }}
          APPLE_API_KEY_ID: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_API_ISSUER || '' }}
          # Mac-only, fallback: Apple ID + app-specific password.
          APPLE_ID: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ startsWith(matrix.os, 'macos') && secrets.APPLE_TEAM_ID || '' }}

  # After all platforms upload, give the release human-friendly asset names,
  # drop the unused auto-updater metadata, and write a clear download guide.
  finalize:
    name: Tidy release assets
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Friendly names + download notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          gh api "repos/$REPO/releases" \
            -q ".[] | select(.tag_name==\"$TAG\") | .assets[] | \"\(.id) \(.name)\"" \
            | while read -r ID NAME; do
                case "$NAME" in
                  *.blockmap|latest*.yml)
                    gh api --method DELETE "repos/$REPO/releases/assets/$ID" ;;
                  *mac-arm64.dmg)
                    gh api --method PATCH "repos/$REPO/releases/assets/$ID" -f name="DockTerm-$VER-macOS-Apple-Silicon.dmg" >/dev/null ;;
                  *mac-x64.dmg)
                    gh api --method PATCH "repos/$REPO/releases/assets/$ID" -f name="DockTerm-$VER-macOS-Intel.dmg" >/dev/null ;;
                  *windows-x64.exe)
                    gh api --method PATCH "repos/$REPO/releases/assets/$ID" -f name="DockTerm-$VER-Windows.exe" >/dev/null ;;
                  *linux-x86_64.AppImage)
                    gh api --method PATCH "repos/$REPO/releases/assets/$ID" -f name="DockTerm-$VER-Linux.AppImage" >/dev/null ;;
                esac
              done
          sed "s/__VER__/$VER/g" .github/RELEASE_NOTES.md > /tmp/notes.md
          gh release edit "$TAG" -R "$REPO" --notes-file /tmp/notes.md
          # Publish automatically: this job only runs after every platform built
          # (needs: release), so a green build = a published, latest release. This
          # also means publishing never depends on a maintainer's local network.
          gh release edit "$TAG" -R "$REPO" --draft=false --latest
