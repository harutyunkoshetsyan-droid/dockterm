<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="adanana — resting">
  <defs>
    <radialGradient id="glowAD" cx="50%" cy="47%" r="56%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenAD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#221e18"/><stop offset="0.5" stop-color="#161310"/><stop offset="1" stop-color="#0e0c09"/>
    </linearGradient>
    <linearGradient id="bevelAD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4334"/><stop offset="1" stop-color="#26221a"/>
    </linearGradient>
    <linearGradient id="sheenAD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="eyeAD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe08a"/><stop offset="0.5" stop-color="#fbbf24"/><stop offset="1" stop-color="#d18a09"/>
    </linearGradient>
    <linearGradient id="leafAD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ee79a"/><stop offset="1" stop-color="#2fa45f"/>
    </linearGradient>
    <radialGradient id="hlAD" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/><stop offset="0.7" stop-color="#ffffff" stop-opacity="0.5"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softAD" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <circle cx="128" cy="120" r="132" fill="url(#glowAD)"/>

  <!-- feet -->
  <rect x="96" y="182" width="22" height="32" rx="11" fill="#171410" stroke="url(#bevelAD)" stroke-width="2.5"/>
  <rect x="138" y="182" width="22" height="32" rx="11" fill="#171410" stroke="url(#bevelAD)" stroke-width="2.5"/>

  <!-- wide rounded body -->
  <rect x="58" y="58" width="140" height="138" rx="50" fill="url(#screenAD)" stroke="url(#bevelAD)" stroke-width="3"/>
  <rect x="72" y="68" width="112" height="44" rx="24" fill="url(#sheenAD)"/>
  <ellipse cx="128" cy="198" rx="60" ry="14" fill="#000" opacity="0.22" filter="url(#softAD)"/>

  <!-- leaf sprout (banana stem) -->
  <path d="M128 58 C126 40 132 30 142 26 C140 38 138 50 128 58 Z" fill="url(#leafAD)"/>
  <path d="M128 58 C130 44 126 36 118 32 C120 42 122 52 128 58 Z" fill="url(#leafAD)" opacity="0.9"/>

  <!-- lashes -->
  <g stroke="#ffe08a" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M86 104 l-7 -6"/><path d="M85 112 l-8 -3"/>
    <path d="M170 104 l7 -6"/><path d="M171 112 l8 -3"/>
  </g>

  <!-- eyes -->
  <rect x="84" y="104" width="36" height="48" rx="17" fill="url(#eyeAD)"/>
  <rect x="136" y="104" width="36" height="48" rx="17" fill="url(#eyeAD)"/>
  <circle cx="95" cy="117" r="7.5" fill="url(#hlAD)"/>
  <circle cx="147" cy="117" r="7.5" fill="url(#hlAD)"/>
  <circle cx="111" cy="140" r="3" fill="#ffffff" opacity="0.5"/>
  <circle cx="163" cy="140" r="3" fill="#ffffff" opacity="0.5"/>

  <!-- blush -->
  <ellipse cx="78" cy="156" rx="11" ry="6.5" fill="#ff9e6b" opacity="0.4" filter="url(#softAD)"/>
  <ellipse cx="178" cy="156" rx="11" ry="6.5" fill="#ff9e6b" opacity="0.4" filter="url(#softAD)"/>

  <!-- shell-cursor smile -->
  <ellipse cx="128" cy="166" rx="24" ry="8" fill="#fbbf24" opacity="0.14" filter="url(#softAD)"/>
  <path d="M110 163 Q128 178 146 163" fill="none" stroke="#fbbf24" stroke-width="8.5" stroke-linecap="round"/>
</svg>
