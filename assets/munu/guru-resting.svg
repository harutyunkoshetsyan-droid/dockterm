<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="guru — resting">
  <defs>
    <radialGradient id="glowGU" cx="50%" cy="47%" r="56%">
      <stop offset="0" stop-color="#4ade80" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenGU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1b23"/><stop offset="0.5" stop-color="#131319"/><stop offset="1" stop-color="#0c0c0e"/>
    </linearGradient>
    <linearGradient id="bevelGU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3d49"/><stop offset="1" stop-color="#20202b"/>
    </linearGradient>
    <linearGradient id="sheenGU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="eyeGU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9bf3b8"/><stop offset="0.5" stop-color="#4ade80"/><stop offset="1" stop-color="#2a9c57"/>
    </linearGradient>
    <linearGradient id="beardGU" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#33333f"/><stop offset="1" stop-color="#21212a"/>
    </linearGradient>
    <radialGradient id="hlGU" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/><stop offset="0.7" stop-color="#ffffff" stop-opacity="0.45"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGU" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <circle cx="128" cy="118" r="132" fill="url(#glowGU)"/>

  <!-- feet -->
  <rect x="98" y="182" width="22" height="32" rx="11" fill="#141419" stroke="url(#bevelGU)" stroke-width="2.5"/>
  <rect x="136" y="182" width="22" height="32" rx="11" fill="#141419" stroke="url(#bevelGU)" stroke-width="2.5"/>

  <!-- hair tuft -->
  <path d="M104 56 Q112 38 138 42 Q156 45 160 58 Q146 49 126 53 Q112 55 104 56 Z" fill="#2b2b33"/>

  <!-- modern tile body -->
  <rect x="54" y="52" width="148" height="140" rx="42" fill="url(#screenGU)" stroke="url(#bevelGU)" stroke-width="3"/>
  <rect x="68" y="62" width="120" height="42" rx="24" fill="url(#sheenGU)"/>
  <ellipse cx="128" cy="198" rx="62" ry="14" fill="#000" opacity="0.22" filter="url(#softGU)"/>

  <!-- confident brows (right one raised) -->
  <path d="M86 98 Q100 90 117 95" fill="none" stroke="#3a3a45" stroke-width="7" stroke-linecap="round"/>
  <path d="M139 93 Q153 86 167 92" fill="none" stroke="#3a3a45" stroke-width="7" stroke-linecap="round"/>

  <!-- eyes (green) -->
  <rect x="93" y="106" width="26" height="32" rx="12" fill="url(#eyeGU)"/>
  <rect x="137" y="106" width="26" height="32" rx="12" fill="url(#eyeGU)"/>
  <circle cx="100" cy="113" r="5" fill="url(#hlGU)"/>
  <circle cx="144" cy="113" r="5" fill="url(#hlGU)"/>

  <!-- sleek modern glasses -->
  <g fill="none" stroke="#b3bcc8" stroke-width="3">
    <rect x="83" y="100" width="44" height="42" rx="16"/>
    <rect x="129" y="100" width="44" height="42" rx="16"/>
    <path d="M127 108 q1 -4 2 0"/>
    <path d="M83 107 L62 102"/>
    <path d="M173 107 L194 102"/>
  </g>

  <!-- groomed beard + mustache -->
  <path d="M84 150 Q86 180 112 186 Q128 190 144 186 Q170 180 172 150 Q166 164 148 166 Q128 170 108 166 Q90 164 84 150 Z" fill="url(#beardGU)"/>
  <path d="M112 150 Q100 147 93 153 Q105 159 118 151 Z" fill="#2c2c37"/>
  <path d="M144 150 Q156 147 163 153 Q151 159 138 151 Z" fill="#2c2c37"/>

  <!-- cool green smirk (the shell cursor) -->
  <path d="M114 159 Q131 169 148 156" fill="none" stroke="#4ade80" stroke-width="7" stroke-linecap="round"/>
</svg>
