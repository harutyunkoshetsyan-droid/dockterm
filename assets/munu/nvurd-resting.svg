<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="nvurd — resting">
  <defs>
    <radialGradient id="glowNV" cx="50%" cy="47%" r="56%">
      <stop offset="0" stop-color="#e07bc6" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#e07bc6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenNV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1b24"/><stop offset="0.5" stop-color="#15131a"/><stop offset="1" stop-color="#0d0c0f"/>
    </linearGradient>
    <linearGradient id="bevelNV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#473a47"/><stop offset="1" stop-color="#241f29"/>
    </linearGradient>
    <linearGradient id="sheenNV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="eyeNV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c2e9"/><stop offset="0.5" stop-color="#e07bc6"/><stop offset="1" stop-color="#b8458f"/>
    </linearGradient>
    <linearGradient id="bowNV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f29ad6"/><stop offset="1" stop-color="#cf5ca8"/>
    </linearGradient>
    <radialGradient id="hlNV" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/><stop offset="0.7" stop-color="#ffffff" stop-opacity="0.5"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softNV" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <circle cx="128" cy="120" r="132" fill="url(#glowNV)"/>

  <!-- feet -->
  <rect x="100" y="170" width="20" height="32" rx="10" fill="#161318" stroke="url(#bevelNV)" stroke-width="2.5"/>
  <rect x="136" y="170" width="20" height="32" rx="10" fill="#161318" stroke="url(#bevelNV)" stroke-width="2.5"/>

  <!-- wide rounded face (slightly wider than tall) -->
  <rect x="59" y="58" width="138" height="124" rx="40" fill="url(#screenNV)" stroke="url(#bevelNV)" stroke-width="3"/>
  <rect x="73" y="68" width="110" height="40" rx="20" fill="url(#sheenNV)"/>
  <ellipse cx="128" cy="188" rx="60" ry="14" fill="#000" opacity="0.22" filter="url(#softNV)"/>

  <!-- ribbon bow (flat on the head) -->
  <path d="M128 60 L93 51 Q83 60 93 69 Z" fill="url(#bowNV)"/>
  <path d="M128 60 L163 51 Q173 60 163 69 Z" fill="url(#bowNV)"/>
  <path d="M100 55 Q96 60 100 65" fill="none" stroke="#b8458f" stroke-width="2" opacity="0.5"/>
  <path d="M156 55 Q160 60 156 65" fill="none" stroke="#b8458f" stroke-width="2" opacity="0.5"/>
  <circle cx="128" cy="60" r="8.5" fill="#cf5ca8"/>
  <circle cx="125" cy="57" r="2.8" fill="#ffffff" opacity="0.55"/>

  <!-- lashes -->
  <g stroke="#f6c2e9" stroke-width="3" stroke-linecap="round" fill="none">
    <path d="M92 96 l-7 -6"/><path d="M91 104 l-8 -3"/>
    <path d="M164 96 l7 -6"/><path d="M165 104 l8 -3"/>
  </g>

  <!-- eyes -->
  <rect x="90" y="94" width="34" height="46" rx="16" fill="url(#eyeNV)"/>
  <rect x="132" y="94" width="34" height="46" rx="16" fill="url(#eyeNV)"/>
  <circle cx="100" cy="106" r="7" fill="url(#hlNV)"/>
  <circle cx="142" cy="106" r="7" fill="url(#hlNV)"/>
  <path d="M108 128 a4 4 0 0 1 8 0" fill="#ffffff" opacity="0.45"/>
  <path d="M150 128 a4 4 0 0 1 8 0" fill="#ffffff" opacity="0.45"/>

  <!-- blush -->
  <ellipse cx="83" cy="146" rx="11" ry="6.5" fill="#f29ad6" opacity="0.45" filter="url(#softNV)"/>
  <ellipse cx="173" cy="146" rx="11" ry="6.5" fill="#f29ad6" opacity="0.45" filter="url(#softNV)"/>

  <!-- shell-cursor smile -->
  <ellipse cx="128" cy="156" rx="22" ry="7" fill="#e07bc6" opacity="0.14" filter="url(#softNV)"/>
  <path d="M114 154 Q128 167 142 154" fill="none" stroke="#e07bc6" stroke-width="8" stroke-linecap="round"/>
</svg>
